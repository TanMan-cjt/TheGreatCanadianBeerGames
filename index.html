<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lobby Display</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: black;
      color: white;
    }

    body {
      position: relative;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      overflow: hidden;
      background: black;
    }

    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content-layer {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 0 40px 40px;
    }

    .left-panel {
      width: 42%;
      max-width: 700px;
      min-width: 320px;
      height: calc(100vh - 20px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 30px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 3rem;
      line-height: 1.1;
    }

    .subheading {
      margin: 0 0 30px 0;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.85);
    }

    #userList {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
      display: grid;
      grid-template-rows: repeat(6, auto);
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      column-gap: 14px;
      row-gap: 14px;
      align-content: start;
      justify-content: start;
      overflow: hidden;
      max-width: 100%;
    }

    #userList li {
      width: 100%;
      min-width: 0;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 1.05rem;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white;
      display: flex;
      align-items: center;
      height: 64px;
      position: relative;
      gap: 12px;
    }

    #userList li.empty {
      font-style: italic;
      color: rgba(255, 255, 255, 0.75);
    }

    .player-photo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
      flex: 0 0 42px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.12);
    }

    .player-photo.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .player-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 22px;
    }

    .captain-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: bold;
      line-height: 1;
    }

    #playButton {
      position: fixed;
      right: 50px;
      bottom: 50px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      display: none;
      z-index: 10;
    }

    #playButton:hover {
      opacity: 0.92;
    }

    .transition-overlay {
        position: fixed;
        left: 0;
        top: 100vh;
        width: 100vw;
        height: 100vh;
        z-index: 999;
        pointer-events: none;
        overflow: hidden;
        display: none;
    }

    .transition-overlay.show {
        display: block;
    }

    .transition-overlay img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .transition-overlay.animate-in {
        display: block;
        animation: slideCoverUp 0.7s ease-in-out forwards;
    }

    .transition-overlay.animate-out {
        animation: slideRevealDown 0.7s ease-in-out forwards;
    }

    @keyframes slideCoverUp {
        from {
            top: 100vh;
        }
        to {
            top: 0;
        }
    }

    @keyframes slideRevealDown {
        from {
            top: 0;
        }
        to {
            top: 100vh;
        }
    }

  </style>
</head>
<body>
  <div class="video-background">
    <video autoplay muted loop playsinline>
      <source src="content/videos/playerLobbyBackground.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="content-layer">
    <div class="left-panel">
      <h1>Players Joined:</h1>
      <p class="subheading">Scan the QR Code to join!</p>
      <ul id="userList"></ul>
    </div>
    <button id="playButton">Play →</button>
  </div>

  <div id="transitionOverlay" class="transition-overlay">
    <img src="content/images/transition.png" alt="" />
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getDatabase,
        ref,
        onValue,
        set,
        get,
        update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrkSrV78Gvxl_h6cps8SG-yDW0-_zJA4A",
      authDomain: "thegreatcanadianbeergames.firebaseapp.com",
      projectId: "thegreatcanadianbeergames",
      storageBucket: "thegreatcanadianbeergames.firebasestorage.app",
      messagingSenderId: "676718255243",
      appId: "1:676718255243:web:9cd17e90c246968198088e",
      measurementId: "G-L8WR52ZM6X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userList = document.getElementById("userList");
    const playersRef = ref(db, "lobby/players");

    const playButton = document.getElementById("playButton");
    const lockedRef = ref(db, "lobby/locked");

    let latestPlayers = [];
    let lobbyLocked = false;

    function updatePlayButton() {
      const playerCount = latestPlayers.length;
      const shouldShow = playerCount >= 9 && playerCount <= 12 && !lobbyLocked;
      playButton.style.display = shouldShow ? "block" : "none";
    }

    function createPhotoElement(player) {
      if (player.photoDataUrl) {
        const img = document.createElement("img");
        img.className = "player-photo";
        img.src = player.photoDataUrl;
        img.alt = `${player.username} photo`;
        return img;
      }

      const placeholder = document.createElement("div");
      placeholder.className = "player-photo placeholder";
      placeholder.textContent = (player.username || "?").charAt(0).toUpperCase();
      return placeholder;
    }

    function renderPlayerTile(player) {
      const li = document.createElement("li");

      const photo = createPhotoElement(player);
      li.appendChild(photo);

      const name = document.createElement("div");
      name.className = "player-name";
      name.textContent = player.username || "Unnamed Player";
      li.appendChild(name);

      if (player.isCaptain) {
        const badge = document.createElement("div");
        badge.className = "captain-badge";
        badge.textContent = "C";
        li.appendChild(badge);
      }

      return li;
    }

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val() || {};
      userList.innerHTML = "";

      latestPlayers = Object.values(data).sort((a, b) => a.joinedAt - b.joinedAt);

      if (!latestPlayers.length) {
        userList.innerHTML = '<li class="empty">No players have joined yet.</li>';
        updatePlayButton();
        return;
      }

      latestPlayers.forEach((player) => {
        userList.appendChild(renderPlayerTile(player));
      });

      updatePlayButton();
    });

    onValue(lockedRef, (snapshot) => {
      lobbyLocked = snapshot.val() === true;
      updatePlayButton();
    });

    let isTransitioning = false;

    playButton.addEventListener("click", async () => {
    if (isTransitioning) return;

    try {
        const playersSnapshot = await get(playersRef);
        const players = playersSnapshot.val() || {};
        const playerCount = Object.keys(players).length;

        if (playerCount < 9) return;
        if (playerCount > 12) return;

        await update(ref(db, "lobby"), {
            locked: true,
            phase: "assignment",
            assignmentLocked: false
        });

        isTransitioning = true;
        transitionOverlay.classList.remove("animate-out");
        transitionOverlay.classList.add("show");
        transitionOverlay.classList.add("animate-in");

        setTimeout(() => {
        window.location.href = "assignment.html?transition=1";
        }, 700);
    } catch (error) {
        console.error("Failed to lock lobby:", error);
    }
    });

    const transitionOverlay = document.getElementById("transitionOverlay");
    const params = new URLSearchParams(window.location.search);

    if (params.get("transition") === "1") {
      transitionOverlay.classList.add("show");

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          transitionOverlay.classList.add("animate-out");
        });
      });

      setTimeout(() => {
        transitionOverlay.style.display = "none";
        const cleanUrl = window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }, 700);
    }
  </script>
</body>
</html>
