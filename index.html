<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lobby Display</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 3rem;
    }

    p {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 1.2rem;
    }

    #userList {
      width: 100%;
      max-width: 700px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #userList li {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 14px;
      font-size: 1.5rem;
      background: #fafafa;
    }

    .empty {
      color: #666;
      font-style: italic;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>Players Joined</h1>
  <p>Live lobby screen</p>

  <ul id="userList"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBrkSrV78Gvxl_h6cps8SG-yDW0-_zJA4A",
    authDomain: "thegreatcanadianbeergames.firebaseapp.com",
    projectId: "thegreatcanadianbeergames",
    storageBucket: "thegreatcanadianbeergames.firebasestorage.app",
    messagingSenderId: "676718255243",
    appId: "1:676718255243:web:9cd17e90c246968198088e",
    measurementId: "G-L8WR52ZM6X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userList = document.getElementById("userList");
    const playersRef = ref(db, "lobby/players");

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();
      userList.innerHTML = "";

      if (!data) {
        userList.innerHTML = '<li class="empty">No players have joined yet.</li>';
        return;
      }

      const players = Object.values(data);

      players.sort((a, b) => a.joinedAt - b.joinedAt);

      players.forEach((player) => {
        const li = document.createElement("li");
        li.textContent = player.username;
        userList.appendChild(li);
      });
    });
  </script>
</body>
</html>
