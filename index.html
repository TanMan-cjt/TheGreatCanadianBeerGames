<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lobby Display</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: black;
      color: white;
    }

    body {
      position: relative;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      overflow: hidden;
      background: black;
    }

    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content-layer {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 0 40px 40px;
    }

    .left-panel {
      width: 42%;
      max-width: 700px;
      min-width: 320px;
      height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 30px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 3rem;
      line-height: 1.1;
    }

    .subheading {
      margin: 0 0 30px 0;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.85);
    }

    #userList {
      list-style: none;
      padding: 0;
      margin: 0;
      overflow-y: auto;
      flex: 1;
    }

    #userList li {
      margin-bottom: 14px;
      padding: 18px 22px;
      border-radius: 16px;
      font-size: 1.5rem;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white;
    }

    #userList li.empty {
      font-style: italic;
      color: rgba(255, 255, 255, 0.75);
    }
  </style>
</head>
<body>
  <div class="video-background">
    <video autoplay muted loop playsinline>
      <source src="content/videos/playerLobbyBackground.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="content-layer">
    <div class="left-panel">
      <h1>Players Joined</h1>
      <p class="subheading">Live lobby screen</p>
      <ul id="userList"></ul>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBrkSrV78Gvxl_h6cps8SG-yDW0-_zJA4A",
    authDomain: "thegreatcanadianbeergames.firebaseapp.com",
    projectId: "thegreatcanadianbeergames",
    storageBucket: "thegreatcanadianbeergames.firebasestorage.app",
    messagingSenderId: "676718255243",
    appId: "1:676718255243:web:9cd17e90c246968198088e",
    measurementId: "G-L8WR52ZM6X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userList = document.getElementById("userList");
    const playersRef = ref(db, "lobby/players");

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();
      userList.innerHTML = "";

      if (!data) {
        userList.innerHTML = '<li class="empty">No players have joined yet.</li>';
        return;
      }

      const players = Object.values(data);
      players.sort((a, b) => a.joinedAt - b.joinedAt);

      players.forEach((player) => {
        const li = document.createElement("li");
        li.textContent = player.username;
        userList.appendChild(li);
      });
    });
  </script>
</body>
</html>
