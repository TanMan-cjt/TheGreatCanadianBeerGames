<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 28px;
      box-sizing: border-box;
      background: #fff;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      text-align: center;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #bbb;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Join the Game</h1>
    <p>Enter your username to join</p>

    <input id="usernameInput" type="text" placeholder="Username" maxlength="20" />
    <button id="joinBtn">Join</button>

    <div id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      get,
      child
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBrkSrV78Gvxl_h6cps8SG-yDW0-_zJA4A",
    authDomain: "thegreatcanadianbeergames.firebaseapp.com",
    projectId: "thegreatcanadianbeergames",
    storageBucket: "thegreatcanadianbeergames.firebasestorage.app",
    messagingSenderId: "676718255243",
    appId: "1:676718255243:web:9cd17e90c246968198088e",
    measurementId: "G-L8WR52ZM6X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const usernameInput = document.getElementById("usernameInput");
    const joinBtn = document.getElementById("joinBtn");
    const status = document.getElementById("status");

    async function joinGame() {
      const rawName = usernameInput.value.trim();
      const username = rawName.replace(/\s+/g, " ");

      if (!username) {
        status.textContent = "Please enter a username.";
        status.className = "error";
        return;
      }

      try {
        const playersRef = ref(db, "lobby/players");
        const snapshot = await get(playersRef);
        const existingPlayers = snapshot.val() || {};

        const duplicate = Object.values(existingPlayers).some(
          (player) => player.username.toLowerCase() === username.toLowerCase()
        );

        if (duplicate) {
          status.textContent = "That username is already taken.";
          status.className = "error";
          return;
        }

        await push(playersRef, {
          username,
          joinedAt: Date.now()
        });

        localStorage.setItem("joinedUsername", username);

        status.textContent = `Joined as ${username}`;
        status.className = "success";

        usernameInput.value = "";
      } catch (error) {
        console.error(error);
        status.textContent = "Something went wrong while joining.";
        status.className = "error";
      }
    }

    joinBtn.addEventListener("click", joinGame);

    usernameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        joinGame();
      }
    });
  </script>
</body>
</html>
