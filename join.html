<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 28px;
      box-sizing: border-box;
      background: #fff;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      text-align: center;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #bbb;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary {
      background: #e9e9e9;
      color: black;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    .hidden {
      display: none;
    }

    #joinedPanel {
      text-align: center;
    }

    #joinedName {
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="joinPanel">
      <h1>Join the Game</h1>
      <p>Enter your username to join</p>

      <input id="usernameInput" type="text" placeholder="Username" maxlength="20" />
      <button id="joinBtn">Join</button>
    </div>

    <div id="joinedPanel" class="hidden">
      <h1>You’re In</h1>
      <p id="joinedName"></p>
      <button id="refreshBtn">Refresh My Status</button>
      <button id="leaveBtn" class="secondary">Leave Game</button>
    </div>

    <div id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      child,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBrkSrV78Gvxl_h6cps8SG-yDW0-_zJA4A",
    authDomain: "thegreatcanadianbeergames.firebaseapp.com",
    projectId: "thegreatcanadianbeergames",
    storageBucket: "thegreatcanadianbeergames.firebasestorage.app",
    messagingSenderId: "676718255243",
    appId: "1:676718255243:web:9cd17e90c246968198088e",
    measurementId: "G-L8WR52ZM6X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const usernameInput = document.getElementById("usernameInput");
    const joinBtn = document.getElementById("joinBtn");
    const status = document.getElementById("status");

    const joinPanel = document.getElementById("joinPanel");
    const joinedPanel = document.getElementById("joinedPanel");
    const joinedName = document.getElementById("joinedName");
    const refreshBtn = document.getElementById("refreshBtn");
    const leaveBtn = document.getElementById("leaveBtn");

    function generatePlayerId() {
      return "player_" + crypto.randomUUID();
    }

    function setStatus(message, className = "") {
      status.textContent = message;
      status.className = className;
    }

    function showJoinedState(username) {
      joinPanel.classList.add("hidden");
      joinedPanel.classList.remove("hidden");
      joinedName.textContent = `Joined as ${username}`;
    }

    function showJoinState() {
      joinedPanel.classList.add("hidden");
      joinPanel.classList.remove("hidden");
    }

    async function findDuplicateUsername(username, currentPlayerId = null) {
      const snapshot = await get(ref(db, "lobby/players"));
      const players = snapshot.val() || {};

      return Object.entries(players).some(([playerId, player]) => {
        if (playerId === currentPlayerId) return false;
        return (player.username || "").toLowerCase() === username.toLowerCase();
      });
    }

    async function restoreExistingPlayer() {
      const savedPlayerId = localStorage.getItem("playerId");
      const savedUsername = localStorage.getItem("joinedUsername");

      if (!savedPlayerId || !savedUsername) {
        showJoinState();
        return;
      }

      try {
        const playerRef = ref(db, `lobby/players/${savedPlayerId}`);
        const snapshot = await get(playerRef);

        if (snapshot.exists()) {
          const player = snapshot.val();
          showJoinedState(player.username || savedUsername);
          setStatus("You are still connected to this game.", "success");
        } else {
          await set(playerRef, {
            username: savedUsername,
            joinedAt: Date.now()
          });

          showJoinedState(savedUsername);
          setStatus("Reconnected to the game.", "success");
        }
      } catch (error) {
        console.error(error);
        setStatus("Could not restore your session.", "error");
        showJoinState();
      }
    }

    async function joinGame() {
      const rawName = usernameInput.value.trim();
      const username = rawName.replace(/\s+/g, " ");

      if (!username) {
        setStatus("Please enter a username.", "error");
        return;
      }

      try {
        let playerId = localStorage.getItem("playerId");

        if (!playerId) {
          playerId = generatePlayerId();
          localStorage.setItem("playerId", playerId);
        }

        const duplicate = await findDuplicateUsername(username, playerId);

        if (duplicate) {
          setStatus("That username is already taken.", "error");
          return;
        }

        await set(ref(db, `lobby/players/${playerId}`), {
          username,
          joinedAt: Date.now()
        });

        localStorage.setItem("joinedUsername", username);

        showJoinedState(username);
        setStatus(`Joined as ${username}`, "success");
        usernameInput.value = "";
      } catch (error) {
        console.error(error);
        setStatus("Something went wrong while joining.", "error");
      }
    }

    async function refreshStatus() {
      const savedPlayerId = localStorage.getItem("playerId");
      const savedUsername = localStorage.getItem("joinedUsername");

      if (!savedPlayerId || !savedUsername) {
        setStatus("No saved player session found.", "error");
        showJoinState();
        return;
      }

      try {
        const snapshot = await get(ref(db, `lobby/players/${savedPlayerId}`));

        if (snapshot.exists()) {
          const player = snapshot.val();
          showJoinedState(player.username || savedUsername);
          setStatus("Your player is still active.", "success");
        } else {
          await set(ref(db, `lobby/players/${savedPlayerId}`), {
            username: savedUsername,
            joinedAt: Date.now()
          });

          showJoinedState(savedUsername);
          setStatus("Your player was restored.", "success");
        }
      } catch (error) {
        console.error(error);
        setStatus("Could not refresh your status.", "error");
      }
    }

    async function leaveGame() {
      const savedPlayerId = localStorage.getItem("playerId");

      if (!savedPlayerId) {
        localStorage.removeItem("joinedUsername");
        showJoinState();
        setStatus("You have left the game.", "success");
        return;
      }

      try {
        await remove(ref(db, `lobby/players/${savedPlayerId}`));
      } catch (error) {
        console.error(error);
      }

      localStorage.removeItem("playerId");
      localStorage.removeItem("joinedUsername");

      showJoinState();
      setStatus("You have left the game.", "success");
    }

    joinBtn.addEventListener("click", joinGame);

    usernameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        joinGame();
      }
    });

    refreshBtn.addEventListener("click", refreshStatus);
    leaveBtn.addEventListener("click", leaveGame);

    restoreExistingPlayer();
  </script>
</body>
</html>
